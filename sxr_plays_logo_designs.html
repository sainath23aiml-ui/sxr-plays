
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@700&family=Orbitron:wght@700;900&family=Syncopate:wght@700&family=Audiowide&display=swap');

  .logos-grid {
    display: flex;
    flex-direction: column;
    gap: 32px;
    padding: 24px 0;
  }

  .logo-card {
    border-radius: 16px;
    border: 0.5px solid var(--color-border-tertiary);
    overflow: hidden;
  }

  .logo-display {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    min-height: 160px;
  }

  .logo-label {
    padding: 10px 20px;
    font-size: 12px;
    color: var(--color-text-secondary);
    border-top: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* === LOGO 1: NEON BRUTALIST === */
  .logo1-bg {
    background: #0a0a0a;
    border-radius: 12px;
  }
  .logo1 {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }
  .logo1-icon {
    width: 52px;
    height: 52px;
    background: #00ff88;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
  }
  .logo1-icon svg {
    width: 28px;
    height: 28px;
  }
  .logo1-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .logo1-sxr {
    font-family: 'Orbitron', monospace;
    font-size: 34px;
    font-weight: 900;
    color: #00ff88;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #00ff8844;
  }
  .logo1-plays {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #ffffff88;
    letter-spacing: 8px;
    margin-top: 2px;
    margin-left: 2px;
  }

  /* === LOGO 2: LUXURY MINIMAL === */
  .logo2-bg {
    background: #f7f4ef;
  }
  .logo2 {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .logo2-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo2-circle svg {
    width: 22px;
    height: 22px;
  }
  .logo2-text {
    display: flex;
    flex-direction: column;
  }
  .logo2-sxr {
    font-family: 'Syncopate', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 6px;
    line-height: 1;
  }
  .logo2-divider {
    height: 1px;
    background: #1a1a1a44;
    margin: 6px 0;
  }
  .logo2-plays {
    font-family: 'Syncopate', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: #1a1a1a88;
    letter-spacing: 10px;
  }

  /* === LOGO 3: RETRO WAVE === */
  .logo3-bg {
    background: linear-gradient(135deg, #1a0033 0%, #2d0060 50%, #0d1f4a 100%);
  }
  .logo3 {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .logo3-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo3-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 30px;
  }
  .logo3-bar {
    width: 5px;
    background: #ff3cac;
    border-radius: 3px;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .logo3-bar:nth-child(1) { height: 14px; animation-delay: 0s; }
  .logo3-bar:nth-child(2) { height: 24px; animation-delay: 0.15s; }
  .logo3-bar:nth-child(3) { height: 30px; animation-delay: 0.3s; }
  .logo3-bar:nth-child(4) { height: 18px; animation-delay: 0.45s; }
  .logo3-bar:nth-child(5) { height: 10px; animation-delay: 0.6s; }
  @keyframes bounce {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.5); }
  }
  .logo3-sxr {
    font-family: 'Bebas Neue', cursive;
    font-size: 52px;
    color: #ffffff;
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #ff3cac 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo3-plays {
    font-family: 'Audiowide', cursive;
    font-size: 12px;
    color: #ffffff66;
    letter-spacing: 10px;
    margin-top: -4px;
  }

  /* === LOGO 4: GEOMETRIC BADGE === */
  .logo4-bg {
    background: #f0f2f5;
  }
  .logo4 {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo4-hexagon {
    width: 68px;
    height: 68px;
    flex-shrink: 0;
  }
  .logo4-text {
    display: flex;
    flex-direction: column;
    gap: 0px;
  }
  .logo4-sxr {
    font-family: 'Rajdhani', sans-serif;
    font-size: 44px;
    font-weight: 700;
    color: #1c3a6e;
    line-height: 0.95;
    letter-spacing: 2px;
  }
  .logo4-plays {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #e85d04;
    letter-spacing: 7px;
    margin-left: 3px;
  }

  /* === LOGO 5: DARK GLASS === */
  .logo5-bg {
    background: #111318;
  }
  .logo5 {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo5-icon-wrap {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo5-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .logo5-sxr {
    font-family: 'Audiowide', cursive;
    font-size: 32px;
    color: #ffffff;
    letter-spacing: 3px;
    line-height: 1;
  }
  .logo5-sxr span {
    color: #7c6bff;
  }
  .logo5-plays {
    font-family: 'Audiowide', cursive;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 9px;
    margin-left: 2px;
  }
</style>

<div class="logos-grid">

  <!-- LOGO 1: Neon Brutalist -->
  <div class="logo-card">
    <div class="logo-display logo1-bg">
      <div class="logo1">
        <div class="logo1-icon">
          <svg viewBox="0 0 28 28" fill="none">
            <polygon points="6,4 22,14 6,24" fill="#0a0a0a"/>
          </svg>
        </div>
        <div class="logo1-text">
          <span class="logo1-sxr">SXR</span>
          <span class="logo1-plays">PLAYS</span>
        </div>
      </div>
    </div>
    <div class="logo-label">01 — Neon Brutalist · Dark bg · Orbitron</div>
  </div>

  <!-- LOGO 2: Luxury Minimal -->
  <div class="logo-card">
    <div class="logo-display logo2-bg">
      <div class="logo2">
        <div class="logo2-circle">
          <svg viewBox="0 0 22 22" fill="none" width="22" height="22">
            <circle cx="11" cy="11" r="4" fill="#1a1a1a"/>
            <circle cx="11" cy="11" r="8" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
            <line x1="11" y1="3" x2="11" y2="1" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo2-text">
          <span class="logo2-sxr">SXR</span>
          <div class="logo2-divider"></div>
          <span class="logo2-plays">PLAYS</span>
        </div>
      </div>
    </div>
    <div class="logo-label">02 — Luxury Minimal · Cream bg · Syncopate</div>
  </div>

  <!-- LOGO 3: Retro Wave -->
  <div class="logo-card">
    <div class="logo-display logo3-bg">
      <div class="logo3">
        <div class="logo3-top">
          <div class="logo3-bars">
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
          </div>
          <span class="logo3-sxr">SXR</span>
          <div class="logo3-bars" style="transform: scaleX(-1);">
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
            <div class="logo3-bar"></div>
          </div>
        </div>
        <span class="logo3-plays">PLAYS</span>
      </div>
    </div>
    <div class="logo-label">03 — Retro Wave · Gradient bg · Bebas Neue + animated bars</div>
  </div>

  <!-- LOGO 4: Geometric Badge -->
  <div class="logo-card">
    <div class="logo-display logo4-bg">
      <div class="logo4">
        <svg class="logo4-hexagon" viewBox="0 0 68 68" fill="none">
          <polygon points="34,4 62,19 62,49 34,64 6,49 6,19" fill="#1c3a6e" stroke="#1c3a6e" stroke-width="0"/>
          <polygon points="34,4 62,19 62,49 34,64 6,49 6,19" fill="none" stroke="#e85d04" stroke-width="2.5"/>
          <polygon points="34,14 52,24 52,44 34,54 16,44 16,24" fill="none" stroke="#1c3a6e22" stroke-width="1"/>
          <text x="34" y="41" text-anchor="middle" fill="white" font-family="'Rajdhani',sans-serif" font-size="20" font-weight="700" letter-spacing="1">▶</text>
        </svg>
        <div class="logo4-text">
          <span class="logo4-sxr">SXR</span>
          <span class="logo4-plays">PLAYS</span>
        </div>
      </div>
    </div>
    <div class="logo-label">04 — Geometric Badge · Light bg · Rajdhani</div>
  </div>

  <!-- LOGO 5: Dark Glass -->
  <div class="logo-card">
    <div class="logo-display logo5-bg">
      <div class="logo5">
        <div class="logo5-icon-wrap">
          <svg viewBox="0 0 32 32" fill="none" width="32" height="32">
            <circle cx="16" cy="16" r="10" stroke="#7c6bff" stroke-width="1.5"/>
            <circle cx="16" cy="16" r="3.5" fill="#7c6bff"/>
            <line x1="16" y1="2" x2="16" y2="6" stroke="#7c6bff" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="16" y1="26" x2="16" y2="30" stroke="#7c6bff" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="16" x2="6" y2="16" stroke="#7c6bff" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="26" y1="16" x2="30" y2="16" stroke="#7c6bff" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo5-text">
          <span class="logo5-sxr">S<span>X</span>R</span>
          <span class="logo5-plays">PLAYS</span>
        </div>
      </div>
    </div>
    <div class="logo-label">05 — Dark Glass · Frosted icon · Audiowide + violet accent</div>
  </div>

</div>
